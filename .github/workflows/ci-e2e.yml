name: CI machinery E2E (platform)

on:
  workflow_call:
    inputs:
      platform_ref:
        description: justin-p/PwnPatterns-ci commit SHA
        required: true
        type: string
      smoke_docs:
        description: Lint first docs/*.md subset and expect consumer smoke probe exits
        required: false
        type: boolean
        default: false
    secrets:
      PWNPATTERNS_CI_CHECKOUT_TOKEN:
        description: Optional PAT for checkout when GITHUB_TOKEN cannot read the private platform repo
        required: false

permissions:
  contents: read

jobs:
  e2e:
    name: CI machinery E2E
    runs-on: ubuntu-latest
    env:
      DOCS_QUALITY_DIR: ${{ github.workspace }}/.github/pwnpatterns-ci/.github/docs-quality
      REPO_ROOT: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Checkout platform
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: justin-p/PwnPatterns-ci
          ref: ${{ inputs.platform_ref }}
          path: .github/pwnpatterns-ci
          token: ${{ secrets.PWNPATTERNS_CI_CHECKOUT_TOKEN != '' && secrets.PWNPATTERNS_CI_CHECKOUT_TOKEN || github.token }}

      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Prepare consumer layout stubs for component tests
        run: |
          set -euo pipefail
          allow="${REPO_ROOT}/.github/docs-quality/config/allowlists"
          mkdir -p "${allow}"
          if [ ! -f "${allow}/terms.txt" ]; then
            printf '%s\n' '# terms' 'actionlint' > "${allow}/terms.txt"
          fi
          if [ ! -f "${allow}/patterns.txt" ]; then
            printf '%s\n' '# patterns' > "${allow}/patterns.txt"
          fi
          if [ ! -f "${allow}/canonical-casing.txt" ]; then
            printf '%s\n' '# casing' > "${allow}/canonical-casing.txt"
          fi

      - name: Component tests
        run: bash .github/pwnpatterns-ci/.github/tests/run-component-tests.sh

      - name: Run CI E2E
        env:
          CI_REVIEWDOG_MODE: local
          CI_E2E_SKIP_SYNC: "false"
          CI_E2E_SKIP_PREK: "true"
          GITHUB_EVENT_PULL_REQUEST_BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          GITHUB_EVENT_PULL_REQUEST_HEAD_SHA: ${{ github.event.pull_request.head.sha || '' }}
          DOC_LINT_INSTALL_DIR: /tmp/doc-linters
        run: |
          grep -vE '^\s*(#|$)' "${DOCS_QUALITY_DIR}/config/manifest.env" >> "${GITHUB_ENV}"
          args=(run-e2e --job all)
          if [ "${{ inputs.smoke_docs }}" = "true" ]; then
            args+=(--smoke-docs)
          fi
          uv run --directory "${DOCS_QUALITY_DIR}/tools/pwnpatterns-ci" \
            pwnpatterns-ci "${args[@]}"
