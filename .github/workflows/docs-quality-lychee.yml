# Reusable PR/push link check (platform: justin-p/PwnPatterns-ci).
name: Documentation quality (lychee)

on:
  workflow_call:
    inputs:
      platform_ref:
        description: justin-p/PwnPatterns-ci commit SHA (must match workflow uses pin)
        required: true
        type: string
    secrets:
      PWNPATTERNS_CI_CHECKOUT_TOKEN:
        description: Optional PAT for checkout when GITHUB_TOKEN cannot read the private platform repo
        required: false

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  lychee:
    name: Check links in docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Checkout platform
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: justin-p/PwnPatterns-ci
          ref: ${{ inputs.platform_ref }}
          path: .github/pwnpatterns-ci
          token: ${{ secrets.PWNPATTERNS_CI_CHECKOUT_TOKEN != '' && secrets.PWNPATTERNS_CI_CHECKOUT_TOKEN || github.token }}

      - name: Determine lychee targets
        id: targets
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            pr_range="${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}"
            mapfile -t files < <(
              git diff --name-only --diff-filter=ACMR "${pr_range}" -- docs/ \
                | grep -E "\.md\$" || true
            )
            if [ "${#files[@]}" -eq 0 ]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "skip=false" >> "$GITHUB_OUTPUT"
            {
              echo 'paths<<EOF'
              printf '%s\n' "${files[@]}"
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            {
              echo 'paths<<EOF'
              echo './docs/**/*.md'
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Restore lychee cache
        if: steps.targets.outputs.skip != 'true'
        id: restore-cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .lycheecache
          key: cache-lychee-v2-${{ github.sha }}
          restore-keys: cache-lychee-v2-

      - name: Install reviewdog
        if: steps.targets.outputs.skip != 'true'
        run: bash "${{ github.workspace }}/.github/pwnpatterns-ci/.github/docs-quality/automation/install/reviewdog.sh"

      - name: Run lychee
        id: lychee
        if: steps.targets.outputs.skip != 'true'
        env:
          REPO_ROOT: ${{ github.workspace }}
          DOCS_QUALITY_DIR: ${{ github.workspace }}/.github/pwnpatterns-ci/.github/docs-quality
          CI_LINT_LOG_DIR: ${{ github.workspace }}/lint-logs
          DOC_LINT_INSTALL_DIR: /tmp
          DOC_PATHS: ${{ steps.targets.outputs.paths }}
          REVIEWDOG_GITHUB_API_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          grep -vE '^\s*(#|$)' "${DOCS_QUALITY_DIR}/config/manifest.env" >> "${GITHUB_ENV}"
          export PATH="${DOC_LINT_INSTALL_DIR}:${PATH}"
          mkdir -p lint-logs
          # shellcheck source=/dev/null
          source "${DOCS_QUALITY_DIR}/automation/lib/ci-steps.sh"
          mapfile -t paths < <(printf '%s\n' "${DOC_PATHS}" | sed '/^$/d')
          set +e
          ci_lychee_pr "${paths[@]}"
          ec=$?
          set -e
          if [ "${ec}" -eq 0 ]; then
            echo "exit_code=0" >> "$GITHUB_OUTPUT"
          else
            echo "exit_code=1" >> "$GITHUB_OUTPUT"
          fi

      - name: Save lychee cache
        if: always() && steps.targets.outputs.skip != 'true'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .lycheecache
          key: ${{ steps.restore-cache.outputs.cache-primary-key }}

      - name: Fail on broken links
        if: steps.targets.outputs.skip != 'true' && steps.lychee.outputs.exit_code != '0'
        run: exit 1
