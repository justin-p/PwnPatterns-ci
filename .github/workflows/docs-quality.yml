# Reusable documentation quality workflow (platform: justin-p/PwnPatterns-ci).
name: Documentation quality (platform)

on:
  workflow_call:
    inputs:
      platform_ref:
        description: justin-p/PwnPatterns-ci commit SHA (must match workflow uses pin)
        required: true
        type: string
      reviewdog_reporter:
        description: reviewdog reporter to use (e.g. github-pr-review, github-check, local)
        required: false
        type: string
        default: github-check
    secrets:
      PWNPATTERNS_CI_CHECKOUT_TOKEN:
        description: Optional PAT for checkout when GITHUB_TOKEN cannot read the private platform repo
        required: false

permissions:
  contents: read
  pull-requests: write
  checks: write

env:
  REPO_ROOT: ${{ github.workspace }}
  DOCS_QUALITY_DIR: ${{ github.workspace }}/.github/pwnpatterns-ci/.github/docs-quality
  CONSUMER_CONFIG_DIR: ${{ github.workspace }}/.github/docs-quality/config
  DOC_LINT_INSTALL_DIR: /tmp/doc-linters
  PWNPATTERNS_CI_UV: ${{ github.workspace }}/.github/pwnpatterns-ci/.github/docs-quality/tools/pwnpatterns-ci

jobs:
  lint:
    name: Lint documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Checkout platform
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: justin-p/PwnPatterns-ci
          ref: ${{ inputs.platform_ref }}
          path: .github/pwnpatterns-ci
          token: ${{ secrets.PWNPATTERNS_CI_CHECKOUT_TOKEN != '' && secrets.PWNPATTERNS_CI_CHECKOUT_TOKEN || github.token }}

      - name: Load manifest
        run: |
          set -euo pipefail
          manifest="${DOCS_QUALITY_DIR}/config/manifest.env"
          grep -vE '^\s*(#|$)' "${manifest}" >> "${GITHUB_ENV}"
          if [ -f "${CONSUMER_CONFIG_DIR}/harper.ignore-rules" ]; then
            {
              echo "HARPER_IGNORE_RULES<<EOF"
              grep -vE '^\s*(#|$)' "${CONSUMER_CONFIG_DIR}/harper.ignore-rules" | paste -sd, -
              echo "EOF"
            } >> "${GITHUB_ENV}"
          fi
          echo "HARPER_USER_DICT=${GITHUB_WORKSPACE}/.github/docs-quality/generated/harper-dictionary.txt" >> "${GITHUB_ENV}"

      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Documentation targets
        id: targets
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_PULL_REQUEST_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GITHUB_EVENT_PULL_REQUEST_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          uv run --directory "${PWNPATTERNS_CI_UV}" pwnpatterns-ci doc-targets

      - name: Stop when no documentation targets
        if: steps.targets.outputs.skip == 'true'
        run: echo "No documentation files to lint for this event."

      - name: Sync allowlists
        if: steps.targets.outputs.skip != 'true'
        run: uv run --directory "${PWNPATTERNS_CI_UV}" pwnpatterns-ci sync-allowlists

      - name: Restore Vale styles cache
        if: steps.targets.outputs.skip != 'true'
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            styles/Google
            styles/Microsoft
            styles/write-good
            styles/alex
          key: vale-styles-v1-${{ hashFiles('.vale.ini') }}
          restore-keys: vale-styles-v1-

      - name: Install prek
        if: steps.targets.outputs.skip != 'true'
        run: uv tool install prek

      - name: Prepare Harper dictionaries
        if: steps.targets.outputs.skip != 'true'
        run: |
          mkdir -p "${HOME}/.config/harper-ls" "${HOME}/.local/share/harper-ls/file_dictionaries"
          touch "${HOME}/.config/harper-ls/dictionary.txt"

      - name: Install documentation linters
        if: steps.targets.outputs.skip != 'true'
        run: uv run --directory "${PWNPATTERNS_CI_UV}" pwnpatterns-ci install-linters

      - name: Sync Vale packages
        if: steps.targets.outputs.skip != 'true'
        run: uv run --directory "${PWNPATTERNS_CI_UV}" pwnpatterns-ci vale-sync

      - name: Save Vale styles cache
        if: steps.targets.outputs.skip != 'true'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            styles/Google
            styles/Microsoft
            styles/write-good
            styles/alex
          key: vale-styles-v1-${{ hashFiles('.vale.ini') }}

      - name: Run linters in parallel
        if: steps.targets.outputs.skip != 'true'
        run: |
          mkdir -p "${GITHUB_WORKSPACE}/lint-logs"
          paths_file="${GITHUB_WORKSPACE}/lint-logs/lint-paths.lst"
          uv run --directory "${PWNPATTERNS_CI_UV}" pwnpatterns-ci load-doc-paths \
            "${{ steps.targets.outputs.paths }}" > "${paths_file}"
          DOC_PATHS="$(cat "${paths_file}")"
          export DOC_PATHS
          uv run --directory "${PWNPATTERNS_CI_UV}" pwnpatterns-ci lint-prose "${GITHUB_WORKSPACE}/lint-logs"

      - name: Install reviewdog
        if: steps.targets.outputs.skip != 'true'
        run: uv run --directory "${PWNPATTERNS_CI_UV}" pwnpatterns-ci install-reviewdog

      - name: Verify pattern metadata
        if: steps.targets.outputs.skip != 'true'
        continue-on-error: true
        env:
          REPO_ROOT: ${{ github.workspace }}
        run: |
          set -euo pipefail
          mkdir -p "${GITHUB_WORKSPACE}/lint-logs"
          paths_file="${GITHUB_WORKSPACE}/lint-logs/lint-paths.lst"
          uv run --directory "${PWNPATTERNS_CI_UV}" pwnpatterns-ci load-doc-paths \
            "${{ steps.targets.outputs.paths }}" > "${paths_file}"
          if [ "${{ steps.targets.outputs.scan_mode }}" = "all" ]; then
            find docs -type f -name '*.md' | sort > "${paths_file}"
          fi
          uv run --directory "${PWNPATTERNS_CI_UV}" pwnpatterns-ci verify-metadata \
            "${GITHUB_WORKSPACE}/lint-logs" \
            --scan-mode "${{ steps.targets.outputs.scan_mode }}" \
            --paths-file "${paths_file}" || true
          uv run --directory "${PWNPATTERNS_CI_UV}" pwnpatterns-ci record-exits "${GITHUB_WORKSPACE}/lint-logs"

      - name: Run prek
        if: steps.targets.outputs.skip != 'true'
        continue-on-error: true
        run: |
          uv run --directory "${PWNPATTERNS_CI_UV}" pwnpatterns-ci run-prek "${GITHUB_WORKSPACE}/lint-logs" || true

      - name: Report to reviewdog
        if: steps.targets.outputs.skip != 'true'
        continue-on-error: true
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ github.token }}
          CI_LINT_LOG_DIR: ${{ github.workspace }}/lint-logs
          LINT_LOG_DIR: ${{ github.workspace }}/lint-logs
        run: |
          reporter="${{ inputs.reviewdog_reporter }}"
          uv run --directory "${PWNPATTERNS_CI_UV}" pwnpatterns-ci report-reviewdog \
            "${GITHUB_WORKSPACE}/lint-logs" --reporter "${reporter}"

      - name: Publish lint summary
        if: steps.targets.outputs.skip != 'true'
        run: |
          {
            echo "## Docs lint summary"
            echo
            for tool in vale typos textlint rumdl harper languagetool metadata prek; do
              exit_f="${GITHUB_WORKSPACE}/lint-logs/${tool}.exit"
              if [ -f "${exit_f}" ]; then
                code="$(cat "${exit_f}")"
                echo "- ${tool}: exit=${code}"
              fi
            done
            echo
            echo "See full diagnostics in job logs under \`lint-logs/\` output."
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Fail on content linters
        if: steps.targets.outputs.skip != 'true'
        run: |
          uv run --directory "${PWNPATTERNS_CI_UV}" pwnpatterns-ci report-failures "${GITHUB_WORKSPACE}/lint-logs"

      - name: Fail on prek
        if: steps.targets.outputs.skip != 'true'
        run: |
          if [ -f "${GITHUB_WORKSPACE}/lint-logs/prek.exit" ] && [ "$(cat "${GITHUB_WORKSPACE}/lint-logs/prek.exit")" -ne 0 ]; then
            cat "${GITHUB_WORKSPACE}/lint-logs/prek.log" 2>/dev/null || true
            exit 1
          fi
